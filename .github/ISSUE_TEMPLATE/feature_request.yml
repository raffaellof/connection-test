name: Feature Request
description: Use this form to request a new feature.
title: "[FEATURE] "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a new feature.
  - type: input
    id: summary
    attributes:
      label: Feature Summary
      description: Provide a clear and concise summary of the requested feature.
      placeholder: Brief summary of the feature.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Explain why this feature would be useful.
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: Describe the feature in detail.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: List any alternative solutions or features considered.
    validations:
      required: false
